name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2244
          script: |
            git config --global --add safe.directory /var/www/html/seguimiento-main
            cd /var/www/html/seguimiento-main

            # Preserve runtime data files before git reset
            cp data/cursos.xlsx /tmp/seguimiento-cursos-backup.xlsx 2>/dev/null || true
            cp data/course-links.json /tmp/seguimiento-links-backup.json 2>/dev/null || true

            git fetch origin main
            git reset --hard origin/main

            # Restore runtime data files (never overwrite with old repo version)
            [ -f /tmp/seguimiento-cursos-backup.xlsx ] && cp /tmp/seguimiento-cursos-backup.xlsx data/cursos.xlsx
            [ -f /tmp/seguimiento-links-backup.json ] && cp /tmp/seguimiento-links-backup.json data/course-links.json

            npm install --legacy-peer-deps
            npm run build
            systemctl restart seguimiento
